<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إحسان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9;
        }
        .sidebar {
            background-color: #1e40af; /* Royal Blue */
            width: 260px;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            border-right: 4px solid #7c3aed; /* Violet */
        }
        .stat-card {
            border-bottom: 4px solid transparent;
        }
        .stat-card:hover {
            border-bottom-color: #7c3aed;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Sidebar = () => (
            <aside className="sidebar fixed top-0 right-0 h-full text-white z-50">
                <div className="p-6 text-2xl font-bold flex items-center border-b border-white/10">
                    <i data-lucide="layout-dashboard" className="ml-2 w-8 h-8 text-primary-gold"></i>
                    لوحة التحكم
                </div>
                <nav className="mt-8">
                    {[
                        { name: 'الرئيسية', icon: 'home', active: true },
                        { name: 'الحملات', icon: 'briefcase' },
                        { name: 'التبرعات', icon: 'credit-card' },
                        { name: 'المستفيدين', icon: 'users' },
                        { name: 'التقارير', icon: 'bar-chart-2' },
                        { name: 'الإعدادات', icon: 'settings' },
                    ].map((item, i) => (
                        <a 
                            key={i} 
                            href="#" 
                            className={`nav-item flex items-center px-6 py-4 mb-1 transition ${item.active ? 'active' : ''}`}
                        >
                            <i data-lucide={item.icon} className="ml-3 w-5 h-5"></i>
                            <span className="font-semibold">{item.name}</span>
                        </a>
                    ))}
                </nav>
                <div className="absolute bottom-0 w-full p-6 border-t border-white/10">
                    <button className="flex items-center text-red-300 hover:text-red-100 transition">
                        <i data-lucide="log-out" className="ml-3 w-5 h-5"></i>
                        خروج
                    </button>
                </div>
            </aside>
        );

        const TopNav = () => (
            <header className="bg-white shadow-sm pr-[260px] h-20 flex items-center justify-between px-8 sticky top-0 z-40">
                <div className="flex items-center text-gray-400">
                    <i data-lucide="search" className="w-5 h-5 ml-2"></i>
                    <input type="text" placeholder="بحث سريع..." className="bg-transparent outline-none text-gray-700" />
                </div>
                <div className="flex items-center space-x-reverse space-x-6">
                    <div className="relative">
                        <i data-lucide="bell" className="w-6 h-6 text-gray-500 cursor-pointer"></i>
                        <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">3</span>
                    </div>
                    <div className="flex items-center gap-3 border-r pr-6">
                        <div className="text-left">
                            <div className="text-sm font-bold text-gray-800">أحمد المدير</div>
                            <div className="text-xs text-gray-500 text-right">مسؤول النظام</div>
                        </div>
                        <div className="w-10 h-10 bg-primary-gold rounded-full flex items-center justify-center text-white font-bold">
                            أ
                        </div>
                    </div>
                </div>
            </header>
        );

        const Dashboard = () => {
            useEffect(() => {
                lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen">
                    <Sidebar />
                    <TopNav />
                    <main className="pr-[260px] p-8">
                        <div className="mb-8">
                            <h1 className="text-2xl font-bold text-gray-800">مرحباً بك مجدداً، أحمد</h1>
                            <p className="text-gray-500">نظرة عامة على أداء المنصة اليوم</p>
                        </div>

                        {/* Stats Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            {[
                                { title: 'إجمالي التبرعات', val: '125,400 ر.س', trend: '+12%', icon: 'dollar-sign', color: 'bg-blue-500' },
                                { title: 'عمليات اليوم', val: '450', trend: '+5%', icon: 'shopping-cart', color: 'bg-green-500' },
                                { title: 'حملات نشطة', val: '24', trend: 'ثابت', icon: 'activity', color: 'bg-purple-500' },
                                { title: 'مستفيدون جدد', val: '1,200', trend: '+18%', icon: 'user-plus', color: 'bg-orange-500' },
                            ].map((s, i) => (
                                <div key={i} className="bg-white p-6 rounded-2xl shadow-sm stat-card">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className={`${s.color} p-3 rounded-xl text-white`}>
                                            <i data-lucide={s.icon} className="w-6 h-6"></i>
                                        </div>
                                        <span className={`text-sm font-bold ${s.trend.includes('+') ? 'text-green-500' : 'text-gray-400'}`}>
                                            {s.trend}
                                        </span>
                                    </div>
                                    <div className="text-gray-500 text-sm mb-1">{s.title}</div>
                                    <div className="text-2xl font-bold text-gray-800">{s.val}</div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Recent Donations Table */}
                            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-gray-800 text-lg">آخر عمليات التبرع</h3>
                                    <button className="text-primary-gold text-sm font-bold hover:underline">عرض الكل</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-right">
                                        <thead>
                                            <tr className="text-gray-400 text-sm border-b">
                                                <th className="pb-4 font-semibold text-right">المتبرع</th>
                                                <th className="pb-4 font-semibold text-right">الحملة</th>
                                                <th className="pb-4 font-semibold text-right">المبلغ</th>
                                                <th className="pb-4 font-semibold text-right">الحالة</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm">
                                            {[
                                                { user: 'محمد العتيبي', project: 'سقيا الماء', amount: '500 ر.س', status: 'مكتمل' },
                                                { user: 'سارة خالد', project: 'كفالة أيتام', amount: '1,200 ر.س', status: 'مكتمل' },
                                                { user: 'فهد الرشيد', project: 'زكاة الفطر', amount: '200 ر.س', status: 'قيد المعالجة' },
                                                { user: 'نورة المنصور', project: 'إطعام مسكين', amount: '100 ر.س', status: 'مكتمل' },
                                            ].map((row, i) => (
                                                <tr key={i} className="border-b last:border-0 hover:bg-gray-50 transition">
                                                    <td className="py-4 font-bold text-gray-800">{row.user}</td>
                                                    <td className="py-4 text-gray-600">{row.project}</td>
                                                    <td className="py-4 font-bold text-primary-green">{row.amount}</td>
                                                    <td className="py-4">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${row.status === 'مكتمل' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>
                                                            {row.status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Active Campaigns */}
                            <div className="bg-white rounded-2xl shadow-sm p-6">
                                <h3 className="font-bold text-gray-800 text-lg mb-6">أعلى الحملات نشاطاً</h3>
                                <div className="space-y-6">
                                    {[
                                        { name: 'بناء مساجد', percent: 85, color: 'bg-blue-500' },
                                        { name: 'كفالة يتيم', percent: 62, color: 'bg-primary-green' },
                                        { name: 'علاج مرضى', percent: 45, color: 'bg-primary-gold' },
                                    ].map((camp, i) => (
                                        <div key={i}>
                                            <div className="flex justify-between text-sm mb-2">
                                                <span className="font-bold text-gray-700">{camp.name}</span>
                                                <span className="text-gray-500">{camp.percent}%</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                                <div 
                                                    className={`${camp.color} h-full rounded-full`} 
                                                    style={{ width: `${camp.percent}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button className="w-full mt-10 py-3 rounded-xl border-2 border-dashed border-gray-200 text-gray-400 font-bold hover:border-primary-gold hover:text-primary-gold transition">
                                    + إضافة حملة جديدة
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
